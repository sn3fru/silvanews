<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S.I.L.V.A. - Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'Inter',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; background:linear-gradient(135deg,#0f172a,#1e293b); }
    .card { background:#fff; width:100%; max-width:400px; border-radius:14px; box-shadow:0 20px 50px rgba(0,0,0,.25); overflow:hidden; }
    .card-header { text-align:center; padding:1.5rem 1.5rem .5rem; }
    .card-header h1 { font-size:1.3rem; color:#111827; font-weight:700; }
    .card-header p { color:#6b7280; font-size:.85rem; margin-top:.25rem; }
    .tabs { display:flex; border-bottom:2px solid #e5e7eb; margin:0 1.5rem; }
    .tab { flex:1; text-align:center; padding:.7rem 0; font-size:.9rem; font-weight:600; color:#9ca3af; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:.2s; }
    .tab.active { color:#2563eb; border-bottom-color:#2563eb; }
    .tab:hover:not(.active) { color:#374151; }
    .form-area { padding:1.2rem 1.5rem 1.5rem; }
    .form-panel { display:none; }
    .form-panel.active { display:block; }
    .fg { margin-bottom:.9rem; }
    .fg label { display:block; margin-bottom:4px; color:#374151; font-weight:600; font-size:.85rem; }
    .fg input { width:100%; padding:10px 12px; border:1px solid #e5e7eb; border-radius:8px; font-size:.9rem; outline:none; }
    .fg input:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.12); }
    .btn-submit { width:100%; padding:11px; background:#2563eb; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:.9rem; transition:.2s; }
    .btn-submit:hover { background:#1d4ed8; }
    .btn-submit:disabled { opacity:.6; cursor:not-allowed; }
    .msg { padding:8px 10px; border-radius:6px; margin-top:8px; font-size:.85rem; display:none; }
    .msg.error { background:#fee2e2; color:#991b1b; display:block; }
    .msg.ok { background:#dcfce7; color:#166534; display:block; }
    .card-footer { text-align:center; padding:0 1.5rem 1.2rem; color:#9ca3af; font-size:.78rem; }
    .domain-hint { color:#6b7280; font-size:.78rem; margin-top:.3rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>S.I.L.V.A.</h1>
      <p>Sistema Inteligente de Leitura e Verificacao Automatizada</p>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="login">Entrar</div>
      <div class="tab" data-tab="signup">Criar Conta</div>
    </div>

    <div class="form-area">
      <!-- LOGIN -->
      <div id="panel-login" class="form-panel active">
        <form id="form-login">
          <div class="fg">
            <label>Email</label>
            <input id="login-email" type="text" placeholder="admin" autocomplete="username" required>
          </div>
          <div class="fg">
            <label>Senha</label>
            <input id="login-senha" type="password" placeholder="Sua senha" autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn-submit">Entrar</button>
          <div id="login-msg" class="msg"></div>
        </form>
      </div>

      <!-- CADASTRO -->
      <div id="panel-signup" class="form-panel">
        <form id="form-signup">
          <div class="fg">
            <label>Nome completo</label>
            <input id="signup-nome" type="text" placeholder="Seu nome" required>
          </div>
          <div class="fg">
            <label>Email corporativo</label>
            <input id="signup-email" type="email" placeholder="seu@enforcegroup.com.br" required>
            <div class="domain-hint">Apenas @enforcegroup.com.br e @btg permitidos</div>
          </div>
          <div class="fg">
            <label>Senha</label>
            <input id="signup-senha" type="password" placeholder="Minimo 4 caracteres" minlength="4" required>
          </div>
          <button type="submit" class="btn-submit">Criar Conta</button>
          <div id="signup-msg" class="msg"></div>
        </form>
      </div>
    </div>

    <div class="card-footer">Acesso restrito a colaboradores autorizados.</div>
  </div>

  <script>
  (function(){
    const API = window.location.origin;

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
      });
    });

    function saveAndRedirect(data) {
      const payload = {
        username: data.user.nome || data.user.email,
        email: data.user.email,
        role: data.user.role,
        user_id: data.user.id,
        token: data.access_token,
        ts: Date.now(),
      };
      localStorage.setItem('silva_auth', JSON.stringify(payload));
      const next = new URLSearchParams(location.search).get('next') || 'index.html';
      window.location.href = next;
    }

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    // Login
    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-submit');
      const msg = document.getElementById('login-msg');
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;
      msg.className = 'msg';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const resp = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });
        if (resp.ok) {
          saveAndRedirect(await resp.json());
        } else {
          const err = await resp.json().catch(() => ({}));
          showMsg(msg, err.detail || 'Credenciais invalidas', 'error');
        }
      } catch {
        showMsg(msg, 'Erro de conexao com o servidor', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    // Signup
    document.getElementById('form-signup').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-submit');
      const msg = document.getElementById('signup-msg');
      const nome = document.getElementById('signup-nome').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const senha = document.getElementById('signup-senha').value;
      msg.className = 'msg';
      btn.disabled = true;
      btn.textContent = 'Criando...';

      try {
        const resp = await fetch(API + '/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, email, senha }),
        });
        if (resp.ok) {
          saveAndRedirect(await resp.json());
        } else {
          const err = await resp.json().catch(() => ({}));
          showMsg(msg, err.detail || 'Erro ao cadastrar', 'error');
        }
      } catch {
        showMsg(msg, 'Erro de conexao com o servidor', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Criar Conta';
      }
    });
  })();
  </script>
</body>
</html>
